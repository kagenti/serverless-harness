name: Build and Push Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Main harness image.
          - image: ghcr.io/kagenti/serverless-harness
            context: .
            file: Dockerfile
          # Pre-baked sandbox image for OpenShift (deploy/knative/setup-ocp.sh).
          # Built the same way as the harness so OCP can pull it from GHCR instead
          # of building it in-cluster (issue #41). Scoped context — sandbox.Dockerfile
          # has no COPY, so deploy/knative keeps the build context small.
          - image: ghcr.io/kagenti/serverless-harness-sandbox
            context: deploy/knative
            file: deploy/knative/sandbox.Dockerfile
          # RC1-2 (Hop 2) plain-HTTP echo target for the AuthBridge egress smoke.
          # Published so OpenShift (deploy/knative/setup-ocp.sh, RC1-4) can pull it
          # from GHCR instead of a local dev.local build; the OCP overlay remaps
          # dev.local/echo-target:rc1 -> this image. Context is echo-target/ because
          # its Dockerfile COPYs echo.js.
          - image: ghcr.io/kagenti/serverless-harness-echo-target
            context: deploy/knative/echo-target
            file: deploy/knative/echo-target/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=main-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
