name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: recursive

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Cache pi-fork node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: pi-fork/node_modules
          key: pi-fork-${{ hashFiles('pi-fork/package-lock.json') }}
          restore-keys: pi-fork-

      - name: Build pi-fork (type declarations)
        run: cd pi-fork && npm ci && npm run build

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          cd harness && pnpm exec tsc --noEmit && cd ..
          cd packages/k8s-sandbox && pnpm exec tsc --noEmit && cd ../..
          cd packages/knative-server && pnpm exec tsc --noEmit && cd ../..
          cd packages/sandbox-relay && pnpm exec tsc --noEmit && cd ../..
          cd packages/ibac-stub && pnpm exec tsc --noEmit && cd ../..
          cd experiments && pnpm exec tsc --noEmit && cd ..

      - name: Test
        run: pnpm -r test

  proto:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99  # v1
        with:
          version: "1.71.0"
          github_token: ${{ github.token }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: gen/go/go.mod

      - name: Lint proto
        run: buf lint

      - name: Regenerate stubs
        run: buf generate

      - name: Verify no codegen drift
        run: |
          git add -A -- packages/k8s-sandbox/src/gen gen
          git diff --cached --exit-code -- packages/k8s-sandbox/src/gen gen \
            || { echo "::error::Generated stubs are out of date or untracked. Run 'buf generate' and commit."; exit 1; }

      - name: Build and test Go stubs
        run: cd gen/go && go build ./... && go test ./...
