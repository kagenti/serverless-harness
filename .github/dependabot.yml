version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # All codeql-action sub-actions (init, analyze, upload-sarif) must be
      # bumped together — they fail CI if versions diverge across steps.
      codeql-action:
        patterns:
          - "github/codeql-action*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
