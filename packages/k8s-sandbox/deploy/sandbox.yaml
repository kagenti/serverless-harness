apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sandbox-workspace
  namespace: default
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox
  namespace: default
  labels:
    app: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      containers:
        - name: sandbox
          image: alpine:3.20
          # Install the tools the Operations rely on, then idle.
          command: ["/bin/sh", "-c"]
          args:
            - apk add --no-cache bash coreutils findutils ripgrep file >/dev/null 2>&1;
              mkdir -p /workspace;
              exec sleep infinity
          workingDir: /workspace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: sandbox-workspace
