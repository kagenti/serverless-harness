# deploy/knative/echo-target.yaml — RC1-2 (Hop 2) plain-HTTP echo target. Reflects the request's
# Authorization header in a JSON body so the live smoke can confirm AB2 injected the REAL egress
# credential (and, for the deny case, that this target never received the request at all). Image
# is self-built dev.local/echo-target:rc1 (kind-loaded by a later task; no Docker Hub pull by the
# cluster) — see deploy/knative/echo-target/{echo.js,Dockerfile}. Applied only when
# SH_AUTHBRIDGE=1 is enabled on the harness (wiring is a later task); inert otherwise.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-target
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-target
  template:
    metadata:
      labels:
        app: echo-target
    spec:
      containers:
        - name: echo-target
          image: dev.local/echo-target:rc1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-target
  namespace: default
spec:
  selector:
    app: echo-target
  ports:
    - port: 80
      targetPort: 8080
