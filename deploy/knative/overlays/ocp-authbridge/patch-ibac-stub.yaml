# Strategic-merge patch onto the ibac-stub Deployment (deploy/knative/ibac-stub.yaml).
# ibac-stub rides the GHCR harness image (dev.local/serverless-harness, remapped by this
# overlay's `images:` block), which declares no USER and so runs as root by default — exactly
# the reason documented at deploy/knative/leaf-cron.yaml:40-41. runAsNonRoot alone would refuse
# to start under nonroot-v2 (MustRunAsNonRoot), so this pins runAsUser: 65532.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibac-stub
spec:
  template:
    spec:
      serviceAccountName: serverless-harness
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ibac-stub
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
