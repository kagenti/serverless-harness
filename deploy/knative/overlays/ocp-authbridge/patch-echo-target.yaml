# Strategic-merge patch onto the echo-target Deployment (deploy/knative/echo-target.yaml).
# The echo-target image declares `USER node` — a NON-NUMERIC user. On OCP, `runAsNonRoot: true`
# alone makes the kubelet refuse the container ("image has non-numeric user (node), cannot verify
# user is non-root": CreateContainerConfigError), because it can't resolve the username to a UID at
# admission time. So we pin a numeric runAsUser: 1000 — the `node` user's UID in the node:*-alpine
# base — which nonroot-v2 (MustRunAsNonRoot, any non-root UID) admits. (AB1's image already uses a
# numeric UID 1001 and ibac-stub is pinned to 65532, so only echo-target needs this.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-target
spec:
  template:
    spec:
      serviceAccountName: serverless-harness
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: echo-target
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
