# JSON6902 patch onto the sandbox-pool-ab2.yaml Sandbox CRs (agents.x-k8s.io/v1beta1), mirroring
# deploy/knative/overlays/ocp/patch-sandbox.yaml but ADD-ONLY: unlike the base pool, this
# `-ab2` pool carries the authbridge-ab2 sidecar container plus HTTP(S)_PROXY env on the sandbox
# container (deploy/knative/sandbox-pool-ab2.yaml) that must be preserved verbatim — so this
# patch does NOT touch image or command, only adds the SCC bits.
#
# The `-ab2` pod has TWO containers: index 0 = sandbox, index 1 = authbridge-ab2. Both need a
# locked-down container securityContext; the pod-level securityContext (runAsUser/fsGroup 65532)
# is required for the durable /workspace PVC (volumeClaimTemplates) to be writable by the
# non-root sandbox container, same rationale as the base overlay's patch-sandbox.yaml.
- op: add
  path: /spec/podTemplate/spec/serviceAccountName
  value: serverless-harness-sandbox
- op: add
  path: /spec/podTemplate/spec/securityContext
  value:
    runAsUser: 65532
    runAsNonRoot: true
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
- op: add
  path: /spec/podTemplate/spec/containers/0/securityContext
  value:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
- op: add
  path: /spec/podTemplate/spec/containers/1/securityContext
  value:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
