# Strategic-merge patch onto the authbridge-ab1 Deployment (deploy/knative/authbridge/ab1-deployment.yaml).
# The official kext authbridge image (ghcr.io/kagenti/kagenti-extensions/authbridge:main-9c131ee)
# already runs as non-root UID 1001 — unlike the harness image (see leaf-cron.yaml:40-41), it
# needs NO runAsUser pin, just runAsNonRoot to satisfy the restricted/nonroot-v2 SCC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authbridge-ab1
spec:
  template:
    spec:
      serviceAccountName: serverless-harness
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: authbridge-ab1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
