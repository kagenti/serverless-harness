# deploy/knative/overlays/ocp-authbridge/kustomization.yaml
# OpenShift overlay for the RC1 AuthBridge egress-control path (SH_AUTHBRIDGE=1 only).
#
# Standalone by design — this does NOT layer on `../ocp` (the base data-plane overlay).
# Both `../ocp`'s sandbox-pool.yaml and this task's sandbox-pool-ab2.yaml define
# sandbox-0/1/2 Sandbox CRs; combining the two bases would produce duplicate resource
# IDs. Instead, this overlay is applied ADDITIONALLY, on top of the already-deployed
# base OCP stack, and carries only the RC1 AB manifests.
#
# All OCP SCC divergence (nonroot, seccomp, dropped capabilities, image remaps) is
# expressed here as image transforms + patches so the shared AB manifests
# (ibac-stub.yaml, authbridge/ab1-deployment.yaml, echo-target.yaml,
# authbridge/ab2-config.yaml, sandbox-pool-ab2.yaml, authbridge/harness-egress-ab1.yaml)
# stay byte-identical to the Kind-gated path.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../ibac-stub.yaml
  - ../../authbridge/ab1-deployment.yaml
  - ../../echo-target.yaml
  - ../../authbridge/ab2-config.yaml
  - ../../sandbox-pool-ab2.yaml
  - ../../authbridge/harness-egress-ab1.yaml

images:
  # ibac-stub reuses the harness image (dev.local/serverless-harness:local in ibac-stub.yaml);
  # this images: transformer matches by name regardless of tag and remaps it to GHCR.
  - name: dev.local/serverless-harness
    newName: ghcr.io/kagenti/serverless-harness
    newTag: latest
  - name: dev.local/echo-target
    newName: ghcr.io/kagenti/serverless-harness-echo-target
    newTag: latest
  - name: dev.local/sandbox-rc1
    newName: ghcr.io/kagenti/serverless-harness-sandbox
    newTag: latest
  # NOTE: the AuthBridge sidecar/gateway image (ghcr.io/kagenti/kagenti-extensions/authbridge)
  # is already the official public image on both AB1 and AB2 — no remap needed.

patches:
  - path: patch-ab1.yaml
  - path: patch-ibac-stub.yaml
  - path: patch-echo-target.yaml
  # Applies to all pool members (sandbox-0..2). No name filter = matches all Sandbox CRs.
  - path: patch-sandbox-ab2.yaml
    target:
      group: agents.x-k8s.io
      version: v1beta1
      kind: Sandbox
