# Single-replica, presence-only gRPC relay (spec §6). Bridges the worker's
# outbound SandboxWorker.Attach stream to in-cluster SandboxExec calls and
# mirrors connected workers into the Redis pool. Inert until SH_REMOTE_SANDBOX
# is enabled on the harness AND a worker connects. Reuses the harness image with
# the relay entrypoint.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-relay
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-relay
  template:
    metadata:
      labels:
        app: sandbox-relay
    spec:
      containers:
        - name: sandbox-relay
          image: dev.local/serverless-harness:local
          imagePullPolicy: IfNotPresent
          # Run from the relay's own package dir. `node --import tsx` resolves the tsx
          # loader relative to the CWD, and the published image links tsx (a devDep) into
          # packages/sandbox-relay/node_modules — NOT a root-hoisted /app/node_modules — so
          # a CWD of /app crashes with ERR_MODULE_NOT_FOUND 'tsx' (issue #102 follow-up).
          # From the package dir, tsx and all runtime deps (@grpc/grpc-js, @sh/*) resolve
          # locally. Matches the package.json `start` script (`node --import tsx src/main.ts`).
          workingDir: /app/packages/sandbox-relay
          command: ["node", "--import", "tsx", "src/main.ts"]
          env:
            - name: REDIS_URL
              value: redis://redis.default.svc.cluster.local:6379
            - name: SH_RELAY_PORT
              value: "8443"
          ports:
            - containerPort: 8443
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-relay
  namespace: default
spec:
  selector:
    app: sandbox-relay
  ports:
    - port: 8443
      targetPort: 8443
