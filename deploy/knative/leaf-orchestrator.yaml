# deploy/knative/leaf-orchestrator.yaml
# Stand-in for the external deterministic orchestrator (MVP spec §4 component 4).
# A plain pod with curl + jq that mounts the shared leaf-work volume at /work. The smoke
# driver execs into it to seed fixtures, dispatch /runs calls, and audit results.
# It is long-lived so it pins the WaitForFirstConsumer PVC to the node.
apiVersion: v1
kind: Pod
metadata:
  name: leaf-orchestrator
  namespace: default
spec:
  restartPolicy: Always
  containers:
    - name: tools
      # alpine:3.20 is a tag, not a digest — fine for a local Kind smoke. If this orchestrator
      # is ever promoted beyond Kind, pin to a digest (alpine@sha256:...) for reproducibility.
      image: alpine:3.20
      command: ["sh", "-c", "apk add --no-cache curl jq >/dev/null 2>&1 && sleep 100000"]
      volumeMounts:
        - name: work
          mountPath: /work
  volumes:
    - name: work
      persistentVolumeClaim:
        claimName: leaf-work
