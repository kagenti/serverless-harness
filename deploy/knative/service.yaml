apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: serverless-harness
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "5"
        autoscaling.knative.dev/scale-to-zero-pod-retention-period: "30s"
        autoscaling.knative.dev/target: "1"
        autoscaling.knative.dev/target-burst-capacity: "0"
    spec:
      containerConcurrency: 1
      timeoutSeconds: 300
      serviceAccountName: serverless-harness
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - image: dev.local/serverless-harness:local
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          ports:
            - containerPort: 8080
          env:
            - name: HOME
              value: /tmp
            - name: REDIS_URL
              value: "redis://redis.default.svc:6379"
            - name: SH_MODEL
              value: "claude-haiku-4-5"
            - name: KAGENTI_SANDBOX_POD
              value: "sandbox-0"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: api-key
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: base-url
                  optional: true
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: auth-token
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Shared leaf-session work volume (MVP spec §5). The harness reads inputs_ref /
          # workspace_ref and writes result_ref under /work. Requires the Knative feature
          # flags kubernetes.podspec-persistent-volume-claim and
          # kubernetes.podspec-persistent-volume-write (enabled in config-features).
          volumeMounts:
            - name: work
              mountPath: /work
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: leaf-work
            readOnly: false
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: serverless-harness
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: serverless-harness-sandbox
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: serverless-harness-sandbox
  namespace: default
subjects:
  - kind: ServiceAccount
    name: serverless-harness
    namespace: default
roleRef:
  kind: Role
  name: serverless-harness-sandbox
  apiGroup: rbac.authorization.k8s.io
