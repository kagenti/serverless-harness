# Example SandboxTransport worker Deployment for OpenShift.
#
# Drop your own worker image in and apply. This connects a worker to the relay
# that `setup-ocp.sh` already deployed (ClusterIP `sandbox-relay.<ns>.svc:8443`,
# plaintext h2c). See README-worker.md for the full walkthrough.
#
# Fill in the three placeholders below:
#   1. image           — your worker image (any language; the reference worker is a Go static binary)
#   2. SANDBOX_ID       — a stable id for this worker; the harness pool keys on it
#   3. SANDBOX_TOKEN    — MUST equal the relay's SH_RELAY_TOKEN (or SH_RELAY_TOKEN_<SANDBOX_ID>)
#
# The relay auth is fail-closed: if the token is unset or mismatched, the Attach
# is rejected before the stream is parked and no presence is written.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-worker
  namespace: default
  labels:
    app: sandbox-worker
spec:
  # One worker per SANDBOX_ID. The relay rejects a second live Attach for the
  # same sandbox_id, so to run several workers give each its own SANDBOX_ID
  # (and matching SH_RELAY_TOKEN_<id> on the relay).
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-worker
  template:
    metadata:
      labels:
        app: sandbox-worker
    spec:
      containers:
        - name: sandbox-worker
          image: REPLACE_ME/your-worker:latest
          env:
            # A stable identifier for this sandbox. The harness pool record and
            # the relay presence key (`sh:sandbox:records`) are keyed on it.
            - name: SANDBOX_ID
              value: sbx-dev-1
            # In-cluster relay Service. Plaintext HTTP/2 (h2c) — no TLS in-cluster.
            - name: RELAY_ADDR
              value: sandbox-relay.default.svc:8443
            # Bearer token sent as `authorization: Bearer <token>` on Attach.
            # Must match the relay's SH_RELAY_TOKEN / SH_RELAY_TOKEN_<SANDBOX_ID>.
            - name: SANDBOX_TOKEN
              value: dev-token
          # OpenShift `restricted-v2` assigns a non-root UID from the namespace
          # range; don't hardcode runAsUser. Your image must not require a fixed UID.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
