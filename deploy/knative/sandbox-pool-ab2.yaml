# deploy/knative/sandbox-pool-ab2.yaml
# RC1-2 (Hop 2) SH_AUTHBRIDGE=1 variant of sandbox-pool.yaml: full copy of the 3 Sandbox CRs with
# an added `authbridge-ab2` sidecar container per pod (AuthBridge egress forward-proxy, see
# deploy/knative/authbridge/ab2-config.yaml) plus HTTP(S)_PROXY env on the `sandbox` container so
# all outbound sandbox traffic transits AB2 before egress. The `sandbox` container never holds the
# real egress credential — only the placeholder (ECHO_CRED) that AB2's static-inject plugin swaps
# for the real per-host secret. Applied ONLY when SH_AUTHBRIDGE=1 (wiring is a later task); the
# default deploy/knative/sandbox-pool.yaml is untouched and stays the flag-off path. Mirrors the
# RC1-1 pattern (deploy/knative/authbridge/harness-egress-ab1.yaml is a separate same-shape
# variant).
apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: sandbox-0
  namespace: default
  labels:
    app: sandbox
spec:
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
  podTemplate:
    metadata:
      labels:
        sh.kagenti.io/sandbox-pool: default    # pool discovery label (harness selects on this)
    spec:
      containers:
        - name: sandbox
          image: dev.local/sandbox-rc1:rc1
          imagePullPolicy: IfNotPresent
          # Tools are baked into the image (deploy/knative/sandbox.Dockerfile) — no apk
          # install at startup, so there's no need to bypass the AB2 proxy env below (that
          # was only ever required for the old apk-at-startup CDN fetch, which raced/timed
          # out under load and made the pool slow to become ready).
          command: ["/bin/sh", "-c", "mkdir -p /workspace && exec sleep infinity"]
          workingDir: /workspace
          env:
            - name: HTTP_PROXY
              value: "http://localhost:8081"
            - name: HTTPS_PROXY
              value: "http://localhost:8081"
            # curl (used by the H2 smoke claims and the sandbox's own egress) ignores the
            # uppercase HTTP_PROXY for http:// URLs — it only honors lowercase http_proxy (and
            # for https:// it honors HTTPS_PROXY). Set both cases so plain `curl http://...`
            # actually transits AB2 instead of bypassing it.
            - name: http_proxy
              value: "http://localhost:8081"
            - name: https_proxy
              value: "http://localhost:8081"
            # NO_PROXY empty on purpose: ALL sandbox HTTP egress transits AB2. Only echo-target
            # egress happens in this PoC. NOTE: any future DIRECT in-cluster egress from the
            # sandbox (e.g. redis, the apiserver) would also be routed through AB2, whose
            # host-keyed static-inject has no credential for those hosts and would fail-closed —
            # such hosts must be added to NO_PROXY (this is why the H1-deny probe in leaf-smoke.sh
            # clears the proxy vars to reach AB1 directly).
            - name: NO_PROXY
              value: ""
            - name: ECHO_CRED
              value: "PLACEHOLDER-TOKEN"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
        - name: authbridge-ab2
          image: dev.local/authbridge-proxy:rc1
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/authbridge/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/authbridge/config.yaml
              subPath: config.yaml
            - name: creds
              mountPath: /etc/authbridge/creds
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: authbridge-ab2-config
        - name: creds
          secret:
            secretName: ab2-egress-cred

