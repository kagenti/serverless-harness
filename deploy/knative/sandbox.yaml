apiVersion: v1
kind: Pod
metadata:
  name: sandbox-0
  namespace: default
  labels:
    app: sandbox
spec:
  containers:
    - name: sandbox
      image: alpine:3.20
      command: ["sleep", "infinity"]
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
