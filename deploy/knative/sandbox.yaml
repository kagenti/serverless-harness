apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: sandbox-0
  namespace: default
  labels:
    app: sandbox
spec:
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
  podTemplate:
    spec:
      containers:
        - name: sandbox
          image: alpine:3.20
          command: ["/bin/sh", "-c", "apk add --no-cache bash coreutils findutils grep ripgrep && mkdir -p /workspace && exec sleep infinity"]
          workingDir: /workspace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
