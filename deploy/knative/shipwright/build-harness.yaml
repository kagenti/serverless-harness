# deploy/knative/shipwright/build-harness.yaml
#
# Shipwright Build for the main serverless-harness image (built from the repo-root
# Dockerfile). Rendered by setup-shipwright-build.sh, which fills in the git URL,
# revision, build strategy, and output image below — do not apply this file directly.
#
# Re-running the build (e.g. after pushing a new commit to the same branch) does not
# require re-applying this Build: just create a new BuildRun against it.
apiVersion: shipwright.io/v1beta1
kind: Build
metadata:
  name: serverless-harness
  namespace: __NAMESPACE__
  labels:
    app: serverless-harness
spec:
  source:
    type: Git
    git:
      url: __GIT_URL__
      revision: __GIT_REVISION__
  strategy:
    kind: ClusterBuildStrategy
    name: __STRATEGY__
  paramValues:
    - name: dockerfile
      value: Dockerfile
  output:
    image: __IMAGE__
  retention:
    succeededLimit: 3
    failedLimit: 3
  timeout: 20m
