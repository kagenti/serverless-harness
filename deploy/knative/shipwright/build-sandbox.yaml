# deploy/knative/shipwright/build-sandbox.yaml
#
# Shipwright Build for the sandbox pool image (deploy/knative/sandbox.Dockerfile).
# Rendered by setup-shipwright-build.sh, which fills in the git URL, revision, build
# strategy, and output image below — do not apply this file directly.
apiVersion: shipwright.io/v1beta1
kind: Build
metadata:
  name: __NAME__
  namespace: __NAMESPACE__
  labels:
    app: serverless-harness-sandbox
spec:
  source:
    type: Git
    git:
      url: __GIT_URL__
      revision: __GIT_REVISION__
    contextDir: deploy/knative
  strategy:
    kind: ClusterBuildStrategy
    name: __STRATEGY__
  paramValues:
    - name: dockerfile
      value: sandbox.Dockerfile
  output:
    image: __IMAGE__
  retention:
    succeededLimit: 3
    failedLimit: 3
  timeout: 10m
