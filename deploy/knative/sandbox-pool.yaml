# deploy/knative/sandbox-pool.yaml
# Static N-pod sandbox pool for the shared-pool architecture (P2, spec D4).
# N=3 is the PoC size — add/remove Sandbox CRs here to scale the pool.
# Each CR produces one pod labeled sh.kagenti.io/sandbox-pool=default;
# the harness discovers all Running pool pods via KAGENTI_SANDBOX_POOL_SELECTOR.
apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: sandbox-0
  namespace: default
  labels:
    app: sandbox
spec:
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
  podTemplate:
    metadata:
      labels:
        sh.kagenti.io/sandbox-pool: default    # pool discovery label (harness selects on this)
    spec:
      # Spread pool pods across nodes. Pool pods request little CPU/memory, so without a
      # hint the scheduler bin-packs all N onto one node — capping the pool at a single
      # node's resources (the multi-node scaling goal is defeated). Soft (ScheduleAnyway)
      # so single-node clusters (Kind) still schedule; topologyKey=hostname aims for at
      # most a 1-pod skew per node.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              sh.kagenti.io/sandbox-pool: default
      containers:
        - name: sandbox
          image: alpine:3.20
          command: ["/bin/sh", "-c", "apk add --no-cache bash coreutils findutils grep ripgrep git && mkdir -p /workspace && exec sleep infinity"]
          workingDir: /workspace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"

