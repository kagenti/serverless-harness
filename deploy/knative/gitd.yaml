# deploy/knative/gitd.yaml
# Hermetic in-cluster git-daemon load substrate for the P3 sharing-ratio experiments.
# Seeds a bare repo with K refs (branch-0..branch-{K-1}); each ref's marker.txt holds its
# own branch name so E7 can assert per-leaf commit consistency. Reachable pool-wide over
# git:// so mixed-ref converge works across all sandboxes. Read-only, disposable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitd
  namespace: default
  labels: { app: gitd }
spec:
  replicas: 1
  selector: { matchLabels: { app: gitd } }
  template:
    metadata: { labels: { app: gitd } }
    spec:
      containers:
        - name: gitd
          image: alpine/git:2.45.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # alpine/git ships `git` but not the git-daemon binary; install it (Alpine subpackage).
              apk add --no-cache git-daemon
              K="${GITD_REFS:-16}"
              R=/srv/git/repo.git
              mkdir -p "$R"
              git init --bare -q "$R"
              W=/tmp/seed
              rm -rf "$W"; git clone -q "$R" "$W"
              cd "$W"
              git config user.email seed@gitd.local
              git config user.name seed
              i=0
              while [ "$i" -lt "$K" ]; do
                git checkout -q --orphan "branch-$i" || git checkout -q -b "branch-$i"
                git rm -rq --cached . 2>/dev/null || true
                printf 'branch-%s' "$i" > marker.txt
                git add marker.txt
                git commit -qm "branch-$i marker"
                git push -q origin "branch-$i"
                i=$((i + 1))
              done
              # E6 workload ref: real code-review fixtures of increasing size (small/medium/large)
              # so leaf review scope (=> sandbox tool calls => duty) spans light..heavy.
              git checkout -q --orphan work || git checkout -q -b work
              git rm -rq --cached . 2>/dev/null || true
              rm -f marker.txt
              printf 'API_KEY = "abc123"\npassword = "hunter2"\n' > small.py
              { echo "import os"; i=0; while [ "$i" -lt 40 ]; do echo "def f$i(x):"; echo "    return eval(x)  # finding $i"; i=$((i+1)); done; } > medium.py
              { echo "import subprocess"; i=0; while [ "$i" -lt 120 ]; do echo "def g$i(x):"; echo "    return eval(x)  # scan $i"; i=$((i+1)); done; } > large.py
              git add small.py medium.py large.py
              git commit -qm "work fixtures"
              git push -q origin work
              # Serve read-only; upload-pack (fetch) is enabled by --export-all.
              exec git daemon --reuseaddr --verbose --export-all \
                --base-path=/srv/git --listen=0.0.0.0 --port=9418 /srv/git
          env:
            - name: GITD_REFS
              value: "16"
          ports:
            - containerPort: 9418
          resources:
            requests: { memory: "32Mi", cpu: "25m" }
            limits: { memory: "128Mi" }
      # No securityContext override: the OCP overlay's non-root SCC applies namespace-wide;
      # git-daemon and git init run fine as an arbitrary non-root UID against /srv/git + /tmp.
---
apiVersion: v1
kind: Service
metadata:
  name: gitd
  namespace: default
spec:
  selector: { app: gitd }
  ports:
    - name: git
      port: 9418
      targetPort: 9418
