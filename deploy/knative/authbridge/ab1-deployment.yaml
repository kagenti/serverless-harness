# AB1 — the shared harness→LLM reverse-proxy gateway (RC1-1 Hop 1). Runs the AuthBridge
# authlib INBOUND pipeline (inference-parser -> ibac -> static-inject) in front of
# https://api.anthropic.com: the harness sends its Anthropic request here with a placeholder
# bearer token, ibac gates the request (static-policy, no_intent_policy: allow is the happy
# path), and static-inject swaps the placeholder for the real key before forwarding. Applied
# only when SH_AUTHBRIDGE=1 is enabled on the harness — inert otherwise, and not wired into
# any kustomization base in this task (see deploy/knative/ibac-stub.yaml for the same
# convention). The referenced Secret `ab1-llm-cred` (real Anthropic key, data key
# `api.anthropic.com`) is created at deploy time by a later task (1g), not here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-ab1-config
  namespace: default
data:
  config.yaml: |
    mode: proxy-sidecar
    listener:
      reverse_proxy_addr: ":8080"
      reverse_proxy_backend: "https://api.anthropic.com"
    pipeline:
      inbound:
        plugins:
          - name: inference-parser
          - name: ibac
            config:
              judge_endpoint: "http://ibac-stub:8080"
              judge_model: "stub"
              judge_inference: true
              no_intent_policy: allow
          - name: static-inject
            config:
              source: secret_dir
              secret_dir: /etc/authbridge/creds
              key_by: static
              key: api.anthropic.com
              placeholder: "AB1-PLACEHOLDER"
              inject_header: x-api-key
      outbound:
        plugins: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authbridge-ab1
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authbridge-ab1
  template:
    metadata:
      labels:
        app: authbridge-ab1
    spec:
      containers:
        - name: authbridge-ab1
          image: dev.local/authbridge-proxy:rc1
          args: ["--config", "/etc/authbridge/config.yaml"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/authbridge/config.yaml
              subPath: config.yaml
            - name: creds
              mountPath: /etc/authbridge/creds
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: authbridge-ab1-config
        - name: creds
          secret:
            secretName: ab1-llm-cred
---
apiVersion: v1
kind: Service
metadata:
  name: authbridge-ab1
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: authbridge-ab1
  ports:
    - port: 8080
      targetPort: 8080
