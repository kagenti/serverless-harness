# AB2 — the per-sandbox AuthBridge egress forward-proxy sidecar (RC1-2 Hop 2). Runs the AuthBridge
# authlib OUTBOUND pipeline (mcp-parser -> ibac -> static-inject) co-located with each pool
# sandbox: the sandbox's HTTP(S)_PROXY point at http://localhost:8081, so every outbound request
# transits AB2 before egress. ibac denies unclassified tools/call-shaped requests with no session
# (no_intent_policy: deny) BEFORE static-inject ever runs; allowed requests get the sandbox's
# placeholder Bearer token swapped for the real per-host credential (key_by: host resolves
# /etc/authbridge/creds/<destination-host>). Shape + config verified against the live spike in
# /tmp/kagenti/rc1/hop2/spike-forwardproxy.md — this is the EXACT bootable config from that spike.
# proxy-sidecar mode also requires reverse_proxy_addr/reverse_proxy_backend (unused inbound here,
# but required by config validation + the unconditional reverse-proxy bind) — pointed at harmless
# loopback. Applied only when SH_AUTHBRIDGE=1 is enabled on the harness (wiring is a later task);
# inert otherwise.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-ab2-config
  namespace: default
data:
  config.yaml: |
    mode: proxy-sidecar
    listener:
      forward_proxy_addr: ":8081"
      reverse_proxy_addr: "127.0.0.1:18080"
      reverse_proxy_backend: "http://127.0.0.1:1"
    pipeline:
      inbound:
        plugins: []
      outbound:
        plugins:
          - name: mcp-parser
            config:
              paths: ["/mcp"]
          - name: ibac
            config:
              judge_endpoint: "http://127.0.0.1:1"
              judge_model: "unused"
              judge_inference: true
              no_intent_policy: "deny"
              unclassified_policy: "passthrough"
          - name: static-inject
            config:
              source: "secret_dir"
              secret_dir: "/etc/authbridge/creds"
              key_by: "host"
              placeholder: "PLACEHOLDER-TOKEN"
