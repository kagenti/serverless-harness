# deploy/knative/authbridge/harness-egress-ab1.yaml
# RC1 SH_AUTHBRIDGE=1-only tightened egress variant of the harness ("brain") pod's
# NetworkPolicy — issue #66 / Z2 lock-down §4 L3, tightened for RC1-1 Hop 1.
#
# Same NetworkPolicy name (`serverless-harness-egress`) and namespace (`default`) as the
# base `deploy/knative/harness-egress-policy.yaml`: task 1g applies this file AFTER the
# base on the SH_AUTHBRIDGE path, so it OVERWRITES the base policy at apply time rather
# than stacking with it. This file is NOT wired into any kustomization in this task and
# is inert unless explicitly applied — the base policy stays byte-for-byte unchanged so
# the flag-off default (no AB1) keeps its existing external-LLM egress on an enforcing
# CNI (OCP).
#
# With AB1 as the in-cluster LLM gateway (see deploy/knative/authbridge/ab1-deployment.yaml),
# the harness no longer needs external :443 — it reaches the LLM in-cluster via AB1. This
# realizes Z2's "harness reaches only AB1": the base's `0.0.0.0/0:443` rule is REPLACED by
# a rule scoped to the AB1 pod on TCP 8080.
#
# kindnet (the Kind default CNI) does NOT enforce NetworkPolicy egress, so this manifest
# is a documented no-op on Kind; the live-enforcement verification gate is OCP (OVN-K),
# per the Z2 spec.
#
# Allowlist (exactly these; NO 0.0.0.0/0:443):
#   - DNS       : UDP+TCP 53, no `to` restriction — in-cluster service resolution for
#                 authbridge-ab1/redis (matches the base's DNS rule shape).
#   - Redis     : TCP 6379, scoped to podSelector app=redis — the durable session log.
#   - AB1       : TCP 8080, scoped to podSelector app=authbridge-ab1 — the in-cluster LLM
#                 gateway. This is the replacement for the base's external :443 rule.
#   - apiserver : TCP 6443 only (6443, NOT 443) to ipBlock 0.0.0.0/0 — the sandbox control
#                 channel (pods/exec). kube-proxy DNATs the kubernetes.default :443
#                 ClusterIP to an apiserver endpoint on :6443, so 6443 alone preserves the
#                 control channel without reopening a public :443 egress hole.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: serverless-harness-egress
  namespace: default
spec:
  # Knative stamps this label on the user pod; select it, not an app= label the
  # Knative pod does not carry. Same selector as the base policy.
  podSelector:
    matchLabels:
      serving.knative.dev/service: serverless-harness
  policyTypes:
    - Egress
  egress:
    # DNS — in-cluster service resolution (authbridge-ab1, redis). Broad by destination,
    # narrow by port, matching the base's DNS rule.
    - ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # Redis — the durable log. Scoped to the in-cluster redis pod by label.
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - { protocol: TCP, port: 6379 }
    # AB1 — the in-cluster LLM gateway. Replaces the base's external 0.0.0.0/0:443 rule:
    # the harness now reaches the LLM via AB1, not directly over the internet.
    - to:
        - podSelector:
            matchLabels:
              app: authbridge-ab1
      ports:
        - { protocol: TCP, port: 8080 }
    # apiserver / sandbox control channel — 6443 ONLY (no 443). kube-proxy DNATs
    # kubernetes.default :443 to an apiserver endpoint on :6443, so 6443 alone keeps the
    # sandbox control channel reachable without reopening a public :443 egress hole.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - { protocol: TCP, port: 6443 }
