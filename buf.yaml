# buf.yaml — v2 module + lint config for the sandbox/v1 contract.
version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # The Attach/Exec streaming frames are deliberately not named
    # <Method>Request/<Method>Response (spec §4). Everything else is STANDARD.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    # SandboxWorker/SandboxExec are the contract's service names (spec §4), not "...Service".
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
